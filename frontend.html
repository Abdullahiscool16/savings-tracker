<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Savings Tracker</title>
    <style>
        /* Modern Mobile-First CSS Styling */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        h1, h2 {
            text-align: center;
            margin-top: 0;
        }

        .muted {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        /* Dashboard UI elements */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            position: relative;
        }

        .stat-val {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 5px;
        }

        /* TikTok Scaling Streak Badge Styles */
        .streak-container {
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .streak-fire {
            display: inline-block;
            transition: transform 0.4s ease;
        }

        .streak-text {
            font-weight: 800;
            color: #ff4500;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.2);
            transition: all 0.4s ease;
        }

        /* Pop animation for whenever streak updates */
        @keyframes streakPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .pop-animation {
            animation: streakPop 0.5s ease-out;
        }

        .target-box {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2563eb;
        }

        .target-val {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success-color);
            margin: 10px 0;
        }

        .feedback-msg {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }

        .success { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        
        /* Fixed Footer Action Buttons Layout */
        .action-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .switch-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #334155;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .switch-btn:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }

        .reset-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .reset-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="login-screen">
            <h1>Welcome Bro! 👋</h1>
            <p class="muted">Enter your name to open your private tracker</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="e.g., abdullah">
            </div>
            <button onclick="handleLogin()">Access Dashboard</button>
        </div>

        <div id="setup-screen" class="hidden">
            <h1>Set Your Goal 🎯</h1>
            <p class="muted">Enter details to calculate your grind target</p>
            
            <div class="input-group">
                <label>What are you buying?</label>
                <input type="text" id="item-name" placeholder="e.g., PS5 Slim">
            </div>
            <div class="input-group">
                <label>Total Price (Rs)</label>
                <input type="number" id="total-goal" placeholder="e.g., 100000">
            </div>
            <div class="input-group">
                <label>Current Savings (Rs)</label>
                <input type="number" id="current-save" placeholder="e.g., 5000">
            </div>
            <div class="input-group">
                <label>Days to Deadline</label>
                <input type="number" id="days" placeholder="e.g., 60">
            </div>
            <button onclick="setupGoal()">Start My Challenge</button>
            <button class="switch-btn" style="margin-top: 15px;" onclick="logout()">← Change User</button>
        </div>

        <div id="dashboard-screen" class="hidden">
            <h2 id="dash-title">Target: Loading...</h2>
            <p class="muted" id="dash-user-welcome">Daily Financial Dashboard</p>

            <div class="target-box">
                <div>REQUIRED TODAY</div>
                <div class="target-val" id="dash-target">0 Rs</div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <label>Saved So Far</label>
                    <div class="stat-val" id="dash-saved">0 Rs</div>
                </div>
                <div class="stat-card">
                    <label>Grind Streak</label>
                    <div id="streak-badge" class="streak-container">
                        <span id="fire-icon" class="streak-fire">🔥</span>
                        <span id="dash-streak" class="streak-text">0 Days</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Log Today's Savings (Rs)</label>
                <input type="number" id="log-amount" placeholder="Enter amount saved">
            </div>
            <button onclick="logSavings()">Submit Daily Money</button>

            <div id="feedback" class="feedback-msg hidden"></div>

            <div class="action-footer">
                <button class="switch-btn" onclick="logout()">Logout</button>
                <button class="reset-btn" onclick="resetGoal()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = "";

        window.onload = function() {
            logout();
        };

        function handleLogin() {
            const inputName = document.getElementById("login-username").value.trim();
            if (!inputName) {
                alert("Please type a username first!");
                return;
            }
            currentUsername = inputName.toLowerCase();
            renderScreen();
        }

        function logout() {
            currentUsername = "";
            document.getElementById("login-username").value = "";
            document.getElementById("feedback").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("setup-screen").classList.add("hidden");
            document.getElementById("dashboard-screen").classList.add("hidden");
        }

        function renderScreen() {
            const userData = localStorage.getItem(`tracker_user_${currentUsername}`);
            document.getElementById("login-screen").classList.add("hidden");
            
            if (userData) {
                const goal = JSON.parse(userData);
                document.getElementById("setup-screen").classList.add("hidden");
                document.getElementById("dashboard-screen").classList.remove("hidden");
                updateDashboard(goal);
            } else {
                document.getElementById("setup-screen").classList.remove("hidden");
                document.getElementById("dashboard-screen").classList.add("hidden");
            }
        }

        function setupGoal() {
            const item = document.getElementById("item-name").value;
            const total = parseInt(document.getElementById("total-goal").value);
            const current = parseInt(document.getElementById("current-save").value);
            const days = parseInt(document.getElementById("days").value);

            if (!item || isNaN(total) || isNaN(current) || isNaN(days)) {
                alert("Please fill in all boxes correctly!");
                return;
            }

            const goalData = {
                item: item,
                total: total,
                current: current,
                days: days,
                streak: 0 // Initialize tracking streak on new setups
            };

            localStorage.setItem(`tracker_user_${currentUsername}`, JSON.stringify(goalData));
            renderScreen();
        }

        function updateDashboard(goal) {
            document.getElementById("dash-user-welcome").innerText = `Account: ${currentUsername.toUpperCase()}`;
            document.getElementById("dash-title").innerText = `Target: ${goal.item}`;
            document.getElementById("dash-saved").innerText = `${goal.current} / ${goal.total} Rs`;
            
            // Fallback initialization just in case old storage sets don't have it
            if (goal.streak === undefined) { goal.streak = 0; }
            
            // TikTok Trend Scaling Factor engine
            const streakDisplay = document.getElementById("dash-streak");
            const fireIcon = document.getElementById("fire-icon");
            streakDisplay.innerText = `${goal.streak} Days`;

            // Calculate font weight, scaling multipliers, and colors dynamically matching high streaks
            const scaleMultiplier = 1 + (goal.streak * 0.03); // Progressively get massive
            const clampedScale = Math.min(scaleMultiplier, 2.2); // Cap size so it doesn't leak out of card borders
            const fireRotation = goal.streak * 5; // Rotate slightly for aesthetic dynamic variance

            streakDisplay.style.transform = `scale(${clampedScale})`;
            fireIcon.style.transform = `scale(${clampedScale}) rotate(${fireRotation}deg)`;
            
            // Transition color shifts from basic orange to ultra deep neon pink/red on high tiers
            if (goal.streak >= 30) {
                streakDisplay.style.color = "#ff007f";
                streakDisplay.style.textShadow = "0 0 15px rgba(255, 0, 127, 0.6)";
            } else if (goal.streak >= 10) {
                streakDisplay.style.color = "#ff3300";
                streakDisplay.style.textShadow = "0 0 12px rgba(255, 51, 0, 0.4)";
            } else {
                streakDisplay.style.color = "#ff6a00";
                streakDisplay.style.textShadow = "0 0 8px rgba(255, 106, 0, 0.2)";
            }

            if (goal.days <= 0) {
                document.getElementById("dash-target").innerText = "Completed!";
                window.currentDailyTarget = 0;
                return;
            }

            let dailyMoney = Math.round((goal.total - goal.current) / goal.days);
            dailyMoney = Math.max(0, dailyMoney);
            
            document.getElementById("dash-target").innerText = `${dailyMoney} Rs`;
            window.currentDailyTarget = dailyMoney; 
        }

        function logSavings() {
            const logInput = document.getElementById("log-amount");
            const ask = parseInt(logInput.value);

            if (isNaN(ask)) {
                alert("Please enter a number!");
                return;
            }

            const feedbackBox = document.getElementById("feedback");
            const userData = JSON.parse(localStorage.getItem(`tracker_user_${currentUsername}`));
            
            if (userData.streak === undefined) { userData.streak = 0; }

            if (ask < window.currentDailyTarget) {
                feedbackBox.className = "feedback-msg warning";
                feedbackBox.innerText = "⚠️ Target missed! The deficit has been added onto your remaining days. Streak reset.";
                userData.streak = 0; // Reset streak score
            } else {
                feedbackBox.className = "feedback-msg success";
                userData.streak += 1; // Increment streak score
                feedbackBox.innerText = `✅ Good job!! Target met. Streak: ${userData.streak} 🔥`;
                
                // Trigger flash pop effect on streak card
                const container = document.getElementById("streak-badge");
                container.classList.remove("pop-animation");
                void container.offsetWidth; // Trigger reflow layout restart trick
                container.classList.add("pop-animation");
            }
            feedbackBox.classList.remove("hidden");

            userData.current = userData.current + ask;
            userData.days = Math.max(0, userData.days - 1);

            localStorage.setItem(`tracker_user_${currentUsername}`, JSON.stringify(userData));
            
            updateDashboard(userData);
            logInput.value = ""; 
        }

        function resetGoal() {
            if (confirm("Are you sure you want to delete your progress data?")) {
                localStorage.removeItem(`tracker_user_${currentUsername}`);
                document.getElementById("feedback").classList.add("hidden");
                document.getElementById("setup-screen").classList.remove("hidden");
                document.getElementById("dashboard-screen").classList.add("hidden");
            }
        }
    </script>
</body>
</html>
