<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Savings Tracker</title>
    <style>
        /* Modern Mobile-First CSS Styling */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        h1, h2 {
            text-align: center;
            margin-top: 0;
        }

        .muted {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        /* Dashboard UI elements */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-val {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 5px;
        }

        .target-box {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2563eb;
        }

        .target-val {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success-color);
            margin: 10px 0;
        }

        /* Dynamic TikTok Style Streak Cards */
        .streak-stage-container {
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        /* Level-Up Animation Trigger class */
        .pop-animation {
            transform: scale(1.08);
        }

        /* Streak Themes: Light, Bronze, Emerald, Diamond, Purple Overlord */
        .tier-light {
            background: linear-gradient(135deg, #334155, #1e293b);
            color: #f1f5f9;
            border-color: #475569;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
        }

        .tier-bronze {
            background: linear-gradient(135deg, #7c2d12, #431407);
            color: #ffedd5;
            border-color: #ea580c;
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.2);
        }

        .tier-emerald {
            background: linear-gradient(135deg, #064e3b, #022c22);
            color: #d1fae5;
            border-color: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .tier-diamond {
            background: linear-gradient(135deg, #1e3a8a, #172554);
            color: #e0f2fe;
            border-color: #0ea5e9;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .tier-purple {
            background: linear-gradient(135deg, #581c87, #3b0764);
            color: #f3e8ff;
            border-color: #a855f7;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.6);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
            to { box-shadow: 0 4px 25px rgba(168, 85, 247, 0.8); }
        }

        .feedback-msg {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }

        .success { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        
        /* Fixed Footer Action Buttons Layout */
        .action-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .switch-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #334155;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .switch-btn:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }

        .reset-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .reset-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="login-screen">
            <h1>Welcome Bro! 👋</h1>
            <p class="muted">Enter your name to open your private tracker</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="e.g., abdullah">
            </div>
            <button onclick="handleLogin()">Access Dashboard</button>
        </div>

        <div id="setup-screen" class="hidden">
            <h1>Set Your Goal 🎯</h1>
            <p class="muted">Enter details to calculate your grind target</p>
            
            <div class="input-group">
                <label>What are you buying?</label>
                <input type="text" id="item-name" placeholder="e.g., PS5 Slim">
            </div>
            <div class="input-group">
                <label>Total Price (Rs)</label>
                <input type="number" id="total-goal" placeholder="e.g., 100000">
            </div>
            <div class="input-group">
                <label>Current Savings (Rs)</label>
                <input type="number" id="current-save" placeholder="e.g., 5000">
            </div>
            <div class="input-group">
                <label>Days to Deadline</label>
                <input type="number" id="days" placeholder="e.g., 60">
            </div>
            <button onclick="setupGoal()">Start My Challenge</button>
            <button class="switch-btn" style="margin-top: 15px;" onclick="logout()">← Change User</button>
        </div>

        <div id="dashboard-screen" class="hidden">
            <h2 id="dash-title">Target: Loading...</h2>
            <p class="muted" id="dash-user-welcome">Daily Financial Dashboard</p>

            <div id="streak-tier-card" class="streak-stage-container tier-light">
                <span id="streak-tier-text">Day 1: Level Light</span>
                <div style="font-size: 0.75rem; font-weight: normal; margin-top: 3px; opacity: 0.85;" id="streak-counter-sub">Streak: 0 Days 🔥</div>
            </div>

            <div class="target-box">
                <div>REQUIRED TODAY</div>
                <div class="target-val" id="dash-target">0 Rs</div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <label>Saved So Far</label>
                    <div class="stat-val" id="dash-saved">0 Rs</div>
                </div>
                <div class="stat-card">
                    <label>Days Left</label>
                    <div class="stat-val" id="dash-days">0</div>
                </div>
            </div>

            <div class="input-group">
                <label>Log Today's Savings (Rs)</label>
                <input type="number" id="log-amount" placeholder="Enter amount saved">
            </div>
            <button onclick="logSavings()">Submit Daily Money</button>

            <div id="feedback" class="feedback-msg hidden"></div>

            <div class="action-footer">
                <button class="switch-btn" onclick="logout()">Logout</button>
                <button class="reset-btn" onclick="resetGoal()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = "";

        window.onload = function() {
            logout();
        };

        function handleLogin() {
            const inputName = document.getElementById("login-username").value.trim();
            if (!inputName) {
                alert("Please type a username first!");
                return;
            }
            currentUsername = inputName.toLowerCase();
            renderScreen();
        }

        function logout() {
            currentUsername = "";
            document.getElementById("login-username").value = "";
            document.getElementById("feedback").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("setup-screen").classList.add("hidden");
            document.getElementById("dashboard-screen").classList.add("hidden");
        }

        function renderScreen() {
            const userData = localStorage.getItem(`tracker_user_${currentUsername}`);
            document.getElementById("login-screen").classList.add("hidden");
            
            if (userData) {
                const goal = JSON.parse(userData);
                document.getElementById("setup-screen").classList.add("hidden");
                document.getElementById("dashboard-screen").classList.remove("hidden");
                updateDashboard(goal);
            } else {
                document.getElementById("setup-screen").classList.remove("hidden");
                document.getElementById("dashboard-screen").classList.add("hidden");
            }
        }

        function setupGoal() {
            const item = document.getElementById("item-name").value;
            const total = parseInt(document.getElementById("total-goal").value);
            const current = parseInt(document.getElementById("current-save").value);
            const days = parseInt(document.getElementById("days").value);

            if (!item || isNaN(total) || isNaN(current) || isNaN(days)) {
                alert("Please fill in all boxes correctly!");
                return;
            }

            const goalData = {
                item: item,
                total: total,
                current: current,
                days: days,
                streak: 0 // Initialize streak on creation
            };

            localStorage.setItem(`tracker_user_${currentUsername}`, JSON.stringify(goalData));
            renderScreen();
        }

        /* 👑 DYNAMIC VISUAL ENGINE FOR STREAK TIERS */
        function applyStreakTierVisuals(streak) {
            const card = document.getElementById("streak-tier-card");
            const text = document.getElementById("streak-tier-text");
            const subtext = document.getElementById("streak-counter-sub");

            // Wipe out existing tier layout classes
            card.className = "streak-stage-container";
            subtext.innerText = `Streak: ${streak} ${streak === 1 ? 'Day' : 'Days'} 🔥`;

            // Evaluate thresholds matching the animation formats
            if (streak < 3) {
                card.classList.add("tier-light");
                text.innerText = "Day 1: Level Light";
            } else if (streak >= 3 && streak < 7) {
                card.classList.add("tier-bronze");
                text.innerText = "Day 5: Level Bronze";
            } else if (streak >= 7 && streak < 15) {
                card.classList.add("tier-emerald");
                text.innerText = "Day 10: Level Emerald";
            } else if (streak >= 15 && streak < 30) {
                card.classList.add("tier-diamond");
                text.innerText = "Day 25: Level Diamond";
            } else {
                card.classList.add("tier-purple");
                text.innerText = "Day 100: Level Overlord 👑";
            }

            // Trigger sleek scale pop animation effect on change
            card.classList.add("pop-animation");
            setTimeout(() => {
                card.classList.remove("pop-animation");
            }, 500);
        }

        function updateDashboard(goal) {
            document.getElementById("dash-user-welcome").innerText = `Account: ${currentUsername.toUpperCase()}`;
            document.getElementById("dash-title").innerText = `Target: ${goal.item}`;
            document.getElementById("dash-saved").innerText = `${goal.current} / ${goal.total} Rs`;
            document.getElementById("dash-days").innerText = goal.days;

            // Make sure streak is defined
            if (goal.streak === undefined) goal.streak = 0;
            applyStreakTierVisuals(goal.streak);

            if (goal.days <= 0) {
                document.getElementById("dash-target").innerText = "Completed!";
                window.currentDailyTarget = 0;
                return;
            }

            let dailyMoney = Math.round((goal.total - goal.current) / goal.days);
            dailyMoney = Math.max(0, dailyMoney);
            
            document.getElementById("dash-target").innerText = `${dailyMoney} Rs`;
            window.currentDailyTarget = dailyMoney; 
        }

        function logSavings() {
            const logInput = document.getElementById("log-amount");
            const ask = parseInt(logInput.value);

            if (isNaN(ask)) {
                alert("Please enter a number!");
                return;
            }

            const feedbackBox = document.getElementById("feedback");
            const userData = JSON.parse(localStorage.getItem(`tracker_user_${currentUsername}`));
            
            if (userData.streak === undefined) userData.streak = 0;

            // Process score engine updates mirroring your logic
            if (ask < window.currentDailyTarget) {
                feedbackBox.className = "feedback-msg warning";
                feedbackBox.innerText = "⚠️ Target missed! Deficit added to remaining days. Streak reset to 0!";
                userData.streak = 0; 
            } else {
                feedbackBox.className = "feedback-msg success";
                userData.streak += 1; 
                feedbackBox.innerText = `✅ Target met! Current streak: ${userData.streak} Days!`;
            }
            feedbackBox.classList.remove("hidden");

            userData.current = userData.current + ask;
            userData.days = Math.max(0, userData.days - 1);

            localStorage.setItem(`tracker_user_${currentUsername}`, JSON.stringify(userData));
            
            updateDashboard(userData);
            logInput.value = ""; 
        }

        function resetGoal() {
            if (confirm("Are you sure you want to delete your progress data?")) {
                localStorage.removeItem(`tracker_user_${currentUsername}`);
                document.getElementById("feedback").classList.add("hidden");
                document.getElementById("setup-screen").classList.remove("hidden");
                document.getElementById("dashboard-screen").classList.add("hidden");
            }
        }
    </script>
</body>
</html>
