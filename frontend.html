<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Savings Tracker</title>
    <style>
        /* Modern Mobile-First CSS Styling */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        h1, h2 {
            text-align: center;
            margin-top: 0;
        }

        .muted {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        /* Dashboard UI elements */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-val {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 5px;
        }

        .target-box {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2563eb;
        }

        .target-val {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success-color);
            margin: 10px 0;
        }

        /* Dynamic TikTok Style Streak Cards */
        .streak-stage-container {
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        /* Level-Up Animation Trigger class */
        .pop-animation {
            transform: scale(1.08);
        }

        /* Streak Themes: Light, Bronze, Emerald, Diamond, Purple Overlord */
        .tier-light {
            background: linear-gradient(135deg, #334155, #1e293b);
            color: #f1f5f9;
            border-color: #475569;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
        }

        .tier-bronze {
            background: linear-gradient(135deg, #7c2d12, #431407);
            color: #ffedd5;
            border-color: #ea580c;
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.2);
        }

        .tier-emerald {
            background: linear-gradient(135deg, #064e3b, #022c22);
            color: #d1fae5;
            border-color: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .tier-diamond {
            background: linear-gradient(135deg, #1e3a8a, #172554);
            color: #e0f2fe;
            border-color: #0ea5e9;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }

        .tier-purple {
            background: linear-gradient(135deg, #581c87, #3b0764);
            color: #f3e8ff;
            border-color: #a855f7;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.6);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
            to { box-shadow: 0 4px 25px rgba(168, 85, 247, 0.8); }
        }

        .feedback-msg {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
        }

        .success { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .warning { background-color: rgba(245, 158, 11, 0.2); color: var(--warning-color); border: 1px solid var(--warning-color); }
        
        /* Fixed Footer Action Buttons Layout */
        .action-footer {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .switch-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #334155;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .switch-btn:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }

        .reset-btn {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-top: 0;
            width: 100%;
        }
        .reset-btn:hover { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="login-screen">
            <h1>Welcome Bro! 👋</h1>
            <p class="muted">Enter your name to open your private tracker</p>
